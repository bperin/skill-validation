substitutions:
  _REGION: us-central1
  _REPOSITORY: project-attest
  _IMAGE_NAME: project-validation
  _IMAGE_TAG: manual-build-not-deployable

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
