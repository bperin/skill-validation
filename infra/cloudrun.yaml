# Declarative reference. infra/gcloud.sh is the executable deploy authority.
# Every ${...} value must be rendered from infra/config.env before replacement.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: ${CLOUD_SQL_CONNECTION_NAME}
        run.googleapis.com/network-interfaces: '[{"network":"${NETWORK_NAME}","subnetwork":"${SUBNET_NAME}"}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: ${RUNTIME_SERVICE_ACCOUNT_EMAIL}
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: ${IMAGE_URI_AT_DIGEST}
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: GCP_PROJECT_ID
              value: ${PROJECT_ID}
            - name: ATTESTATION_KMS_KEY_VERSION
              value: ${ATTESTATION_KMS_KEY_VERSION}
            - name: ATTESTATION_ISSUER
              value: ${ATTESTATION_ISSUER}
            - name: VERIFICATION_BASE_URL
              value: ${VERIFICATION_BASE_URL}
            - name: EVM_CHAIN_ID
              value: ${EVM_CHAIN_ID}
            - name: EVM_VERIFIER_CONTRACT
              value: ${EVM_VERIFIER_CONTRACT}
            - name: EVM_PUBLISHER_ADDRESS
              value: ${EVM_PUBLISHER_ADDRESS}
            - name: EVM_PUBLISHER_KMS_KEY_VERSION
              value: ${EVM_PUBLISHER_KMS_KEY_VERSION}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ${DATABASE_URL_SECRET}
                  key: latest
            - name: ISSUER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${ISSUER_TOKEN_SECRET}
                  key: latest
            - name: EVM_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: ${EVM_RPC_URL_SECRET}
                  key: latest
          startupProbe:
            httpGet:
              path: /healthz
          livenessProbe:
            httpGet:
              path: /healthz
